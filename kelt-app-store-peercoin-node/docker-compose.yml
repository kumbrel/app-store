version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: kelt-app-store-peercoin-node_web_1
      APP_PORT: 8080

  web:
    image: amir20/dozzle:v8.12.8@sha256:8ff3115c9c9dd7576839df6f2575de345ca7cafa398cf2496f1f19c31d862ac1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure
    depends_on:
      - node

  node:
    image: peercoin/peercoind:0.15.1
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/.peercoin:/data
    ports:
      - 9902:9902
      - 9901:9901
    command:
      -datadir=/data
      -printtoconsole
      -server
      -rpcbind=0.0.0.0
      -rpcallowip=0.0.0.0/0
      -rpcport=9902
      -port=9901
      -rpcuser=pooluser
      -rpcpassword=poolpassword
